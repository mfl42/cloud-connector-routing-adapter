name: CI — local tests + smoke (venus)

on:
  push:
    branches: [main, dev, "feat/**", "fix/**"]
  pull_request:
    branches: [main, dev]

jobs:
  # ── 1. Offline translation checks (no VyOS needed) ────────────────────────
  check-examples:
    name: Translation plan check
    runs-on: [self-hosted, venus]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Run check_examples.sh
        run: bash scripts/check_examples.sh

      - name: CLI plan (node-network-config)
        run: |
          python3 -m hbr_vyos_adapter.cli plan \
            --file examples/node-network-config.json

  # ── 2. Boundary tests (pure Python, no VyOS) ─────────────────────────────
  boundary:
    name: Boundary conditions
    runs-on: [self-hosted, venus]
    needs: check-examples
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Run boundary tests
        run: python3 scripts/boundary-hbr-api-local.py

      - name: Upload boundary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boundary-artifacts
          path: artifacts/private/hbr-boundary-local/

  # ── 3. Chaos tests (pure Python, no VyOS) ────────────────────────────────
  chaos:
    name: Chaos scenarios
    runs-on: [self-hosted, venus]
    needs: check-examples
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Run chaos scenarios
        run: python3 scripts/chaos-hbr-api-local.py

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-artifacts
          path: artifacts/private/hbr-chaos-local/

  # ── 4. Fuzz tests (pure Python, 120 iterations) ──────────────────────────
  fuzz:
    name: Fuzz (120 iterations)
    runs-on: [self-hosted, venus]
    needs: check-examples
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Run fuzz harness
        run: python3 scripts/fuzz-hbr-api-local.py --iterations 120

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: artifacts/private/hbr-fuzz-local/

  # ── 5. Smoke test — dry-run against VyOS VM ───────────────────────────────
  smoke-plan:
    name: Smoke — plan phase (dry run)
    runs-on: [self-hosted, venus]
    needs: [check-examples, boundary, chaos, fuzz]
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: smoke plan (node-network-config-smoke)
        run: bash scripts/smoke-vyos-vm.sh plan

  # ── 3. Smoke test — live apply against VyOS VM ───────────────────────────
  smoke-apply:
    name: Smoke — live apply (VyOS 192.0.2.230)
    runs-on: [self-hosted, venus]
    needs: smoke-plan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    env:
      VYOS_URL: https://192.0.2.230
      VYOS_API_KEY: ${{ secrets.VYOS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: VyOS API reachability check
        run: bash scripts/smoke-vyos-vm.sh api-test

      - name: Smoke apply (safe smoke manifests only)
        run: bash scripts/smoke-vyos-vm.sh apply

  # ── 4. VyOS image build (../vyos/ project) ───────────────────────────────
  # ── 8. Trigger VyOS build matrix (nightly / main only) ───────────────────
  vyos-build:
    name: VyOS build matrix (trigger)
    runs-on: [self-hosted, venus]
    needs: check-examples
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger vyos-build-matrix workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run vyos-build-matrix.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field run_vpp_tests=true \
            --field flavors=generic,container,container-rootfs \
            || echo "Workflow dispatch not available; skipping (nightly schedule will run it)"
